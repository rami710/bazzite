name: Build Live ISOs

on:
  workflow_dispatch:
  push:
    branches: [main, testing]

env:
  REPO_OWNER: ${{ github.repository_owner }}

permissions: 
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ON NE GARDE QUE LA VERSION DE BASE POUR ÉVITER LE CRASH SERVEUR
        image_name:
          - bazzite
    steps:
      - name: Show disk space
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Mount Container Storage BTRFS Loopback
        run: |
          sudo truncate -s 70G /mnt/podman-storage.img
          sudo mkfs.btrfs -f /mnt/podman-storage.img
          sudo podman system reset --force
          sudo systemctl stop podman.service
          sudo mount -o compress-force=zstd:2 /mnt/podman-storage.img /var/lib/containers/storage
          sudo systemctl start podman.service

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Image Tag
        id: generate-tag
        shell: bash
        run: |
          TAG="stable"
          if [[ "${{ github.ref_name }}" == "testing" ]]; then
              TAG="testing"
          elif [[ "${{ github.ref_name }}" == "unstable" ]]; then
              TAG="unstable"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set Flatpaks Directory Shortname
        id: generate-flatpak-dir-shortname
        shell: bash
        run: |
          FLATPAK_DIR_SHORTNAME="kde_flatpaks"
          if [[ "${{ matrix.image_name }}" =~ "gnome" ]]; then
            FLATPAK_DIR_SHORTNAME="gnome_flatpaks"
          fi
          echo "flatpak-dir-shortname=${FLATPAK_DIR_SHORTNAME}" >> $GITHUB_OUTPUT

      - name: Get lower-case equivalent of the repository owner's username
        id: repo_owner_case
        run: echo "lowercase=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Obtain non-deck image ref
        id: get-nondeck-ref
        run: |
          ref="${{ matrix.image_name }}"
          ref="${ref/-deck/}"
          ref="${ref/-nvidia-open/}"
          ref="${ref/-nvidia/}"
          if [[ "$ref" == "bazzite-nvidia-gnome" ]]; then
            ref="bazzite-gnome-nvidia"
          fi
          echo "ref=${ref}" >> $GITHUB_OUTPUT

      - name: Build Container Image
        run: |
          BASE_IMAGE="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ steps.get-nondeck-ref.outputs.ref }}:${{ steps.generate-tag.outputs.tag }}"
          INSTALL_IMAGE_PAYLOAD="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"
          FLATPAK_DIR_SHORTNAME="${{ steps.generate-flatpak-dir-shortname.outputs.flatpak-dir-shortname }}"

          sudo podman build \
            --cap-add sys_admin \
            --security-opt label=disable \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg INSTALL_IMAGE_PAYLOAD="$INSTALL_IMAGE_PAYLOAD" \
            --build-arg FLATPAK_DIR_SHORTNAME="$FLATPAK_DIR_SHORTNAME" \
            -t localhost/payload:latest installer/

      - name: Build ISOs
        uses: Zeglius/titanoboa@revamp-pr
        id: build
        with:
          image-ref: localhost/payload:latest
          iso-dest: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso

      - name: Move ISOs to Upload Directory
        id: upload-directory
        shell: bash
        run: |
          ISO_UPLOAD_DIR=${{ github.workspace }}/upload
          ISO_PATH=${{ steps.build.outputs.iso-dest }}
          ISO_NAME=$(basename ${ISO_PATH})

          mkdir -p ${ISO_UPLOAD_DIR}
          mv ${ISO_PATH} ${ISO_UPLOAD_DIR}
          echo "iso-upload-dir=${ISO_UPLOAD_DIR}" >> $GITHUB_OUTPUT

      - name: Upload ISOs to Job Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image_name }}-OS-custom
          path: ${{ steps.upload-directory.outputs.iso-upload-dir }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true
